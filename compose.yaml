services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: handy_dani
      POSTGRES_USER: handy_dani
      POSTGRES_PASSWORD: handy_dani_dev
    ports:
      - "5432:5432"
    volumes:
      - handy_dani_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handy_dani -d handy_dani"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  handy_dani_postgres:
