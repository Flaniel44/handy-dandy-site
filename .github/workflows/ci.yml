name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Test, lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: handy_dani_test
          POSTGRES_USER: handy_dani
          POSTGRES_PASSWORD: handy_dani_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U handy_dani -d handy_dani_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://handy_dani:handy_dani_ci@127.0.0.1:5432/handy_dani_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build production application
        run: npm run build

  promote-production:
    name: Mark commit ready for production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Advance production branch to the tested commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPOSITORY}/git/refs" \
            -f ref="refs/heads/production" \
            -f sha="${COMMIT_SHA}" \
          || gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPOSITORY}/git/refs/heads/production" \
            -f sha="${COMMIT_SHA}" \
            -F force=false
