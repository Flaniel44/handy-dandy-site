<div id="scene-root" class="scene-root">
<style>
.scene-root{font-family:var(--font-sans);}
.stage{position:relative;border-radius:12px;overflow:hidden;background:#0b0d16;transition:background 0.8s ease;}
.scene-root.lit .stage{background:#151a2c;}
.hide{opacity:0;}
.scene-root.lit .hide{animation:flickerOn 1s steps(1,end) forwards;}
@keyframes flickerOn{0%{opacity:0;}8%{opacity:1;}16%{opacity:0.15;}26%{opacity:1;}34%{opacity:0.1;}46%{opacity:1;}55%{opacity:0.3;}65%{opacity:1;}100%{opacity:1;}}
.data-wire-base{fill:none;stroke:#5a6080;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;opacity:.72;}
.data-wire-flow{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:2 13;animation:dataFlow 1.35s linear infinite;animation-play-state:paused;filter:url(#dataGlow);}
.scene-root.lit .data-wire-flow{animation-play-state:running;}
.data-node{fill:#8ed8ff;filter:url(#dataGlow);}
.data-node{animation:nodePulse 1.8s ease-in-out infinite;animation-play-state:paused;}
.scene-root.lit .data-node{animation-play-state:running;}
.antenna-stem{fill:none;stroke:#a9adb8;stroke-width:3.4;stroke-linecap:round;}
.antenna-tip{fill:#a9adb8;}
.wifi-wave{fill:none;stroke:#c7cad5;stroke-width:3;stroke-linecap:round;opacity:0;animation:wifiTransmit 2.8s ease-out infinite;animation-play-state:paused;}
.wifi-wave.wave-outer{animation-delay:.42s;}
.scene-root.lit .wifi-wave{animation-play-state:running;}
.legacy-gears{display:none;}
@keyframes dataFlow{to{stroke-dashoffset:-60;}}
@keyframes nodePulse{50%{opacity:.42;}}
@keyframes wifiTransmit{0%,18%,100%{opacity:0;}34%,62%{opacity:1;}78%{opacity:0;}}
.chain{cursor:pointer;transition:transform 0.2s ease;transform-box:fill-box;transform-origin:top;}
.chain:hover{transform:translateY(8px);}
.lamp{animation:lampFlicker 1s steps(1,end) forwards, ambientFlicker 13s ease-in-out infinite;animation-play-state:paused,paused;}
.scene-root.lit .lamp{animation-play-state:running,running;}
@keyframes lampFlicker{0%{opacity:0;}20%{opacity:1;}35%{opacity:0.15;}50%{opacity:1;}65%{opacity:0.2;}80%{opacity:1;}100%{opacity:1;}}
@keyframes ambientFlicker{0%,92%,100%{opacity:1;}94%{opacity:0.25;}96%{opacity:1;}97%{opacity:0.4;}98%{opacity:1;}}
.lamp1{animation-delay:0.2s,1s;}
.lamp2{animation-delay:0.4s,3.5s;}
.lamp3{animation-delay:0.6s,6s;}
.lamp4{animation-delay:0.8s,8.5s;}
.captions{text-align:center;padding:1.25rem 1rem 0.25rem;}
.name-ph{font-size:20px;font-weight:500;color:var(--text-primary);margin:0 0 4px;}
.tag-ph{font-size:14px;color:var(--text-secondary);margin:0 0 1.25rem;}
.cta-row{display:flex;gap:10px;justify-content:center;padding-bottom:1.5rem;flex-wrap:wrap;}
.cta-row button{min-width:120px;}
</style>
